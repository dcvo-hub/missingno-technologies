<script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=69c4fb4bc51b8377ed2d08d2" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
<script src="js/missingno-technologies.js" type="text/javascript"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  function revealOnScroll(selector, threshold) {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-inview");
          obs.unobserve(entry.target);
        }
      });
    }, { threshold });
    document.querySelectorAll(selector).forEach((el) => obs.observe(el));
  }

  revealOnScroll(".item-approach", 0.15);
  revealOnScroll(".item-expertise", 0.15);
  revealOnScroll(
    ".section-training .subtitle, .section-training .title-h2, .section-training .text-xl, .section-training .item-training",
    0.15
  );
  revealOnScroll(".wrapper-contact", 0.2);

  const section = document.querySelector(".section-team");
  if (!section) return;
  const leftCol = section.querySelector(".col-1-contact");
  const rightCol = section.querySelector(".col-2-team");
  const items = section.querySelectorAll(".item-contact");
  const teamObs = new IntersectionObserver((entries, obs) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      if (leftCol) leftCol.classList.add("is-inview");
      if (rightCol) rightCol.classList.add("is-inview");
      items.forEach((item, index) => {
        setTimeout(() => item.classList.add("is-inview"), 250 + index * 80);
      });
      obs.unobserve(entry.target);
    });
  }, { threshold: 0.2 });
  teamObs.observe(section);
});
</script>
