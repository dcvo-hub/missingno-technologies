<div data-animation="default" data-collapse="none" data-duration="400" data-easing="ease" data-easing2="ease" role="banner" class="navbar w-nav">
  <div class="container container-navbar w-container">
    <div class="div-block">
      <div class="left-nav">
        <a href="#" class="w-nav-brand"><img src="images/logo-mnt.png" loading="lazy" alt="logo MissingNo Technologies" class="logo"></a>
        <div class="text-block">MissingNo<br>Technologies.</div>
        <div class="int-site">
          <div class="point"></div>
          <div>Senior Embedded Engineering Partner</div>
        </div>
      </div>
      <nav class="nav-menu w-nav-menu">
        {{ range .Params.nav.links }}
        <a href="{{ .href }}" class="nav-link w-nav-link">{{ .text }}</a>
        {{ end }}
      </nav>
      <a href="{{ .Params.nav.cta_href }}" class="button button-small w-inline-block">
        <div>{{ .Params.nav.cta }}</div>
      </a>
    </div>
    <div class="w-nav-button">
      <div class="w-icon-nav-menu"></div>
    </div>
  </div>
</div>
